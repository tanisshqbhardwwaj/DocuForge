services:
  - type: web
    name: docuforge-api
    env: node
    buildCommand: npm run install-all
    startCommand: npm run server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    disk:
      name: docuforge-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
